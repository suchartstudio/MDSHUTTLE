<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามรถรับส่ง - MD Shuttle Bus</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; background-color: #fdfbf7; color: #002244; margin: 0; padding: 15px; }
        h1 { font-size: 26px; text-align: center; color: #004080; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { font-size: 20px; font-weight: bold; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 15px; font-size: 20px; margin-bottom: 15px; border: 2px solid #004080; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #004080; color: white; font-size: 22px; font-weight: bold; padding: 15px; border: none; border-radius: 8px; width: 100%; cursor: pointer; }
        #map { height: 300px; width: 100%; border-radius: 8px; margin-top: 15px; display: none; border: 2px solid #ccc; }
        .info-box { background-color: #e6f2ff; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 20px; display: none; border-left: 6px solid #004080; }
        .highlight { font-size: 26px; color: #cc0000; font-weight: bold; }
    </style>
</head>
<body>
    <h1>📍 MD Shuttle Bus</h1>
    
    <div class="card">
        <label for="busSelect">หมายเลขรถที่ต้องการติดตาม</label>
        <input type="text" id="busSelect" placeholder="ระบุหมายเลขรถ เช่น Bus-01">
        <button id="trackBtn">ค้นหาและติดตามรถ</button>
    </div>

    <div id="infoBox" class="info-box">
        <div>คนขับ: <span id="displayDriver">-</span></div>
        <div style="margin-top:10px;">ระยะห่างจากคุณ: <span id="distance" class="highlight">-</span> กม.</div>
        <div style="margin-top:10px;">เวลามาถึงโดยประมาณ: <span id="eta" class="highlight">-</span> นาที</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let map, userMarker, busMarker;
        let userLat, userLng;

        // คำนวณระยะทางเส้นตรง (Haversine Formula)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // รัศมีโลก กิโลเมตร
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        document.getElementById('trackBtn').addEventListener('click', () => {
            const busId = document.getElementById('busSelect').value;
            if (!busId) { alert('กรุณาระบุหมายเลขรถ'); return; }

            // ดึงพิกัดผู้ใช้
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    
                    document.getElementById('map').style.display = 'block';
                    document.getElementById('infoBox').style.display = 'block';

                    if (!map) {
                        map = L.map('map').setView([userLat, userLng], 15);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        userMarker = L.marker([userLat, userLng]).addTo(map).bindPopup("คุณอยู่ที่นี่").openPopup();
                    }

                    // ฟังการเปลี่ยนแปลงตำแหน่งรถจาก Firebase
                    const busRef = ref(db, 'buses/' + busId);
                    onValue(busRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            document.getElementById('displayDriver').innerText = data.driver;
                            
                            const dist = calculateDistance(userLat, userLng, data.lat, data.lng);
                            document.getElementById('distance').innerText = dist.toFixed(2);
                            
                            // สมมติความเร็วรถใน รพ. 20 กม./ชม.
                            const timeMins = (dist / 20) * 60; 
                            document.getElementById('eta').innerText = Math.ceil(timeMins);

                            if (busMarker) {
                                busMarker.setLatLng([data.lat, data.lng]);
                            } else {
                                // ไอคอนรถสีแดง
                                const busIcon = L.icon({
                                    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                                    iconSize: [25, 41], iconAnchor: [12, 41]
                                });
                                busMarker = L.marker([data.lat, data.lng], {icon: busIcon}).addTo(map).bindPopup("รถรับส่งอยู่ที่นี่");
                            }
                            
                            // ปรับมุมมองให้อยู่กึ่งกลางระหว่างรถและคน
                            const group = new L.featureGroup([userMarker, busMarker]);
                            map.fitBounds(group.getBounds(), {padding: [30, 30]});
                        } else {
                            alert("ไม่พบข้อมูลรถหมายเลขนี้ หรือรถยังไม่เปิดระบบ");
                        }
                    });

                }, () => { alert("กรุณาอนุญาตการเข้าถึงตำแหน่งที่ตั้ง (GPS)"); });
            }
        });
    </script>
</body>
</html>
