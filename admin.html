<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MD Shuttle Bus</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />  
    <style>
        body { margin: 0; font-family: 'Chakra Petch', sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #f7f9fc; }
        #map-container { width: 70%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; }
        
        #sidebar { width: 30%; height: 100%; background: #fff; display: flex; flex-direction: column; box-shadow: -5px 0 20px rgba(0,0,0,0.05); z-index: 1000; }
        .header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .header h2 { margin: 0; font-size: 24px; color: #1a1a1a; font-weight: 700; }
        
        .tabs { display: flex; border-bottom: 1px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; background: #fafafa; font-weight: 600; font-size: 14px; }
        .tab.active { background: #fff; border-bottom: 3px solid #1a1a1a; color: #1a1a1a; }
        .list-container { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .list-container.active { display: block; }

        .item-card { background: #fff; border: 1px solid #f0f0f0; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .item-title { font-weight: 700; font-size: 18px; color: #1a1a1a; }
        .item-desc { font-size: 14px; color: #666; margin-top: 5px; line-height: 1.4; }
        .badge { background: #ff3366; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
        
        .small-btn { background: #eee; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-family: 'Chakra Petch'; margin-top: 8px; font-weight: 600; font-size:12px; }
        .small-btn:hover { background: #ddd; }
    </style>
</head>
<body>
    <div id="map-container">
        <div id="map"></div>
    </div>
    
    <div id="sidebar">
        <div class="header">
            <h2>Dashboard ผู้ดูแลระบบ</h2>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('buses')">🚍 รถในระบบ</div>
            <div class="tab" onclick="switchTab('express')">🛺 เรียกรถด่วน</div>
            <div class="tab" onclick="switchTab('routes')">🗺️ เส้นทาง</div>
        </div>
        
        <div id="buses-list" class="list-container active"></div>
        <div id="express-list" class="list-container"></div>
        <div id="routes-list" class="list-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    <script type="module">
        // เพิ่ม update, remove เข้ามาใช้งาน
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMptdLpLEdbeVFKZj82M0gyoV2m_2y5Pk",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.list-container').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName + '-list').classList.add('active');
        }

        const map = L.map('map').setView([16.4674, 102.8277], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- เปิดใช้งานเครื่องมือวาดแผนที่ Leaflet-Geoman ---
        map.pm.addControls({
            position: 'topleft', drawCircle: false, drawRectangle: false, 
            drawCircleMarker: false, drawPolygon: false, drawText: false, cutPolygon: false
        });

        // เมื่อวาดเส้น หรือปักหมุดเสร็จบนแผนที่
        map.on('pm:create', e => {
            const layer = e.layer;
            if (e.shape === 'Line') {
                const name = prompt("ตั้งชื่อเส้นทางรถ (เช่น สายสีเหลือง):");
                if (!name) { map.removeLayer(layer); return; } 
                const detail = prompt("รายละเอียดเส้นทาง (เช่น ผ่านตึก ก):") || '';
                const color = prompt("สีของเส้น (ภาษาอังกฤษหรือ Hex Code เช่น red, blue, #FFD700):") || 'blue';
                
                push(ref(db, 'config/routes'), {
                    name: name, detail: detail, color: color,
                    points: layer.getLatLngs().map(l => [l.lat, l.lng])
                });
                map.removeLayer(layer); // ลบเส้นวาดชั่วคราวออก เดี๋ยวจะโหลดมาจาก Firebase แทน
            } else if (e.shape === 'Marker') {
                const name = prompt("ตั้งชื่อจุดจอดรถ (ป้ายรถ):");
                if (!name) { map.removeLayer(layer); return; }
                
                push(ref(db, 'config/stops'), {
                    name: name, lat: layer.getLatLng().lat, lng: layer.getLatLng().lng
                });
                map.removeLayer(layer);
            }
        });

        // เมื่อกดลบเลเยอร์ (ปุ่มถังขยะในเครื่องมือ)
        map.on('pm:remove', e => {
            const layer = e.layer;
            if (layer.firebaseKey) {
                if (layer.firebaseType === 'route') remove(ref(db, 'config/routes/' + layer.firebaseKey));
                else if (layer.firebaseType === 'stop') remove(ref(db, 'config/stops/' + layer.firebaseKey));
            }
        });

        // --- โหลดข้อมูลเส้นทางและจุดจอด จาก Firebase ---
        let routeLayers = {};
        onValue(ref(db, 'config/routes'), snapshot => {
            const data = snapshot.val();
            for (let k in routeLayers) map.removeLayer(routeLayers[k]);
            routeLayers = {};
            const routeList = document.getElementById('routes-list');
            routeList.innerHTML = '';
            
            if (data) {
                for (let key in data) {
                    const r = data[key];
                    const layer = L.polyline(r.points, {color: r.color, weight: 5, pmIgnore: false}).addTo(map);
                    layer.bindPopup(`<b>${r.name}</b><br>${r.detail}`);
                    layer.firebaseKey = key;
                    layer.firebaseType = 'route';
                    
                    // หาก Admin ขยับจุดเส้นทาง (แก้พิกัด)
                    layer.on('pm:update', e => {
                        const newPoints = e.layer.getLatLngs().map(l => [l.lat, l.lng]);
                        update(ref(db, 'config/routes/' + key), { points: newPoints });
                    });
                    routeLayers[key] = layer;
                    
                    routeList.innerHTML += `
                        <div class="item-card">
                            <div class="item-title" style="color:${r.color}">〰️ ${r.name}</div>
                            <div class="item-desc">${r.detail}</div>
                            <button class="small-btn" onclick="editRouteInfo('${key}', '${r.name}', '${r.detail}', '${r.color}')">✏️ แก้ไขข้อมูล</button>
                        </div>`;
                }
            } else {
                routeList.innerHTML = '<p style="text-align:center; color:#888;">ยังไม่มีเส้นทางที่บันทึกไว้</p>';
            }
        });

        // ฟังก์ชันแก้ไขข้อมูลตัวอักษรของเส้นทาง
        window.editRouteInfo = function(key, oldName, oldDetail, oldColor) {
            const name = prompt("แก้ไขชื่อเส้นทาง:", oldName);
            if (!name) return;
            const detail = prompt("แก้ไขรายละเอียด:", oldDetail);
            const color = prompt("แก้ไขสี:", oldColor);
            
            update(ref(db, 'config/routes/' + key), {
                name: name, detail: detail || '', color: color || oldColor
            });
        }

        // โหลดจุดจอด
        let stopLayers = {};
        onValue(ref(db, 'config/stops'), snapshot => {
            const data = snapshot.val();
            for (let k in stopLayers) map.removeLayer(stopLayers[k]);
            stopLayers = {};
            if (data) {
                for (let key in data) {
                    const stop = data[key];
                    const icon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-violet.png', iconSize: [20,32] });
                    const layer = L.marker([stop.lat, stop.lng], {icon: icon, pmIgnore: false}).addTo(map);
                    layer.bindPopup(`<b>ป้ายรถ:</b> ${stop.name}`);
                    layer.firebaseKey = key;
                    layer.firebaseType = 'stop';
                    
                    // หากขยับป้ายรถ
                    layer.on('pm:update', e => {
                        update(ref(db, 'config/stops/' + key), { lat: e.layer.getLatLng().lat, lng: e.layer.getLatLng().lng });
                    });
                    stopLayers[key] = layer;
                }
            }
        });

        // --- ระบบติดตามรถที่ซ่อน Offline ---
        let busMarkers = {};
        onValue(ref(db, 'buses'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('buses-list');
            list.innerHTML = '';
            const now = Date.now();
            let hasOnline = false;
            const onlineIds = [];

            if (data) {
                for (const id in data) {
                    const bus = data[id];
                    // กรองรถ Offline (ไม่ได้อัปเดตเกิน 2 นาที)
                    if (now - bus.timestamp > 120000) { continue; }

                    hasOnline = true;
                    onlineIds.push(id);

                    if (busMarkers[id]) { 
                        busMarkers[id].setLatLng([bus.lat, bus.lng]); 
                    } else {
                        const icon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', iconSize: [25, 41] });
                        busMarkers[id] = L.marker([bus.lat, bus.lng], {icon}).addTo(map).bindPopup(`รถ: ${id}`);
                    }
                    list.innerHTML += `
                        <div class="item-card">
                            <div class="item-title">🚍 ${id}</div>
                            <div class="item-desc">คนขับ: ${bus.driver}<br>อัปเดต: ${new Date(bus.timestamp).toLocaleTimeString()}</div>
                        </div>`;
                }
            }

            // ลบหมุดรถที่ตกขอบ Offline ไปแล้วออกจากแผนที่
            for (const id in busMarkers) {
                if (!onlineIds.includes(id)) {
                    map.removeLayer(busMarkers[id]);
                    delete busMarkers[id];
                }
            }

            if (!hasOnline) { list.innerHTML = '<p style="text-align:center; color:#888;">ไม่มีรถ Online ในระบบ</p>'; }
        });

        // โหลดเรียกรถด่วน (คงเดิม)
        let expressMarkers = [];
        onValue(ref(db, 'express_requests'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('express-list');
            list.innerHTML = '';
            expressMarkers.forEach(m => map.removeLayer(m));
            expressMarkers = [];

            if (data) {
                const reqs = Object.entries(data).reverse(); 
                reqs.forEach(([key, req]) => {
                    list.innerHTML += `<div class="item-card">
                        <div class="item-title"><span class="badge">ด่วน</span> ${req.name}</div>
                        <div class="item-desc">
                            <b>โทร:</b> ${req.phone}<br>
                            <b>เวลาเรียก:</b> ${new Date(req.timestamp).toLocaleTimeString()}<br>
                            <b>สถานะ:</b> ${req.status === 'waiting' ? 'รอดำเนินการ' : 'รับแล้ว'}
                        </div>
                    </div>`;

                    if(req.status === 'waiting') {
                        const pIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [20, 32] });
                        const dIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [20, 32] });
                        expressMarkers.push(L.marker([req.pickupLat, req.pickupLng], {icon: pIcon}).addTo(map).bindPopup(`รับ: ${req.name}`));
                        expressMarkers.push(L.marker([req.dropoffLat, req.dropoffLng], {icon: dIcon}).addTo(map).bindPopup(`ส่ง: ${req.name}`));
                        expressMarkers.push(L.polyline([[req.pickupLat, req.pickupLng], [req.dropoffLat, req.dropoffLng]], {color: 'gray', dashArray: '4', weight: 2}).addTo(map));
                    }
                });
            } else {
                list.innerHTML = '<p style="text-align:center; color:#888;">ไม่มีการเรียกรถด่วน</p>';
            }
        });
    </script>
</body>
</html>
